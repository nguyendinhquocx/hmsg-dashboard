<style>
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f5f7fb;
  margin: 0;
  min-height: 100vh;
  color: #23272f;
}
.dashboard-wrapper {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  background: #f5f7fb;
}
.dashboard-header {
  padding: 44px 0 18px 0;
  text-align: center;
}
.dashboard-title {
  font-size: 2.6rem;
  font-weight: 700;
  letter-spacing: .5px;
  margin-bottom: 24px;
  color: #23272f;
  text-shadow: 0 1px 0 #fff, 0 2px 8px #e7eaf3;
}
.dashboard-card {
  max-width: 1200px;
  margin: 0 auto 32px auto;
  background: #fff;
  border-radius: 22px;
  box-shadow: 0 6px 36px rgba(60,60,60,.10);
  padding: 38px 22px 54px 22px;
}

.gallery-menu {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-bottom: 36px;
  flex-wrap: wrap;
}
.gallery-menu-btn {
  padding: 12px 36px;
  border-radius: 9px;
  font-size: 1.15rem;
  background: #e4e6ea;
  color: #23272f;
  border: none;
  cursor: pointer;
  font-weight: 600;
  letter-spacing: 1px;
  box-shadow: 0 2px 12px rgba(180,180,180,0.06);
  transition: background 0.16s, color 0.16s, box-shadow 0.18s, transform 0.18s;
  outline: none;
  position: relative;
  z-index: 1;
}
.gallery-menu-btn.active, .gallery-menu-btn:focus {
  background: #f1f1f6;
  color: #1976d2;
  box-shadow: 0 6px 24px rgba(60,120,220,0.09);
  transform: translateY(-2px) scale(1.07);
}
.gallery-menu-btn:hover:not(.active) {
  background: #ededf3;
  color: #1976d2;
  box-shadow: 0 2px 14px rgba(24, 96, 200, 0.10);
  transform: translateY(-1px) scale(1.03);
}

.export-btn {
  display: block;
  margin: 44px auto 0 auto;
  padding: 13px 44px;
  border-radius: 9px;
  font-size: 1.15rem;
  background: #e4e6ea;
  color: #23272f;
  border: none;
  cursor: pointer;
  transition: background 0.16s, color 0.16s, box-shadow 0.18s, transform 0.18s;
  font-weight: 700;
  letter-spacing: 1px;
  box-shadow: 0 2px 12px rgba(180,180,180,0.06);
}
.export-btn:hover, .export-btn:focus {
  background: #f1f1f6;
  color: #1976d2;
  box-shadow: 0 6px 24px rgba(60,120,220,0.09);
  transform: translateY(-2px) scale(1.06);
}

.gallery {
  display: flex;
  flex-direction: column;
  gap: 38px;
  align-items: center;
}
.img-card {
  width: 100%;
  max-width: 970px;
  background: #f8fafd;
  border-radius: 18px;
  box-shadow: 0 2px 16px rgba(60,60,60,.09);
  padding: 20px 0;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: box-shadow 0.16s, transform 0.18s;
  cursor: pointer;
  margin: 0 auto;
}
.img-card img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 13px;
  box-shadow: 0 1px 7px rgba(0,0,0,.07);
  transition: transform 0.2s;
  background: #fff;
  max-width: 100%;
  max-height: 68vh;
}
.img-card:hover {
  box-shadow: 0 8px 36px rgba(0,0,0,.15);
  transform: scale(1.01);
}

/* Modal popup */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0; top: 0; width: 100vw; height: 100vh;
  background: rgba(30, 34, 44, 0.83);
  justify-content: center;
  align-items: center;
  cursor: zoom-out;
}
.modal.open { display: flex; }
.modal-img {
  max-width: 94vw;
  max-height: 91vh;
  border-radius: 27px;
  box-shadow: 0 10px 36px rgba(0,0,0,.42);
  background: #fff;
  animation: zoomIn .22s;
  object-fit: contain;
  margin: 0 38px;
}
@keyframes zoomIn {
  from { transform: scale(0.85);}
  to { transform: scale(1);}
}
.arrow-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 2.7rem;
  background: #fff;
  color: #23272f;
  border: none;
  border-radius: 50%;
  width: 54px;
  height: 54px;
  cursor: pointer;
  z-index: 1000;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0.90;
  transition: background 0.15s, color 0.15s;
  user-select: none;
  box-shadow: 0 2px 18px rgba(40,40,40,0.15);
}
.arrow-btn.left { left: 24px; }
.arrow-btn.right { right: 24px; }
.arrow-btn:hover {
  background: #1976d2;
  color: #fff;
}

/* Responsive */
@media (max-width: 900px) {
  .dashboard-card { padding: 12px 3vw 32px 3vw; }
  .img-card { max-width: 99vw;}
  .modal-img { max-width: 99vw; max-height: 82vh;}
  .arrow-btn { width:40px; height:40px; font-size:2rem;}
}
@media (max-width:600px) {
  .dashboard-title { font-size:1.6rem; }
}

::-webkit-scrollbar {
  width: 8px; background: #f1f1f6;
}
::-webkit-scrollbar-thumb {
  background: #e4e6ea; border-radius: 8px;
}
::-webkit-scrollbar-thumb:hover {
  background: #d1d3d9;
}
</style>
