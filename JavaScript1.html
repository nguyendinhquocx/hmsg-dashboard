<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
let images = [];
let currentIdx = 0;
let galleryList = [];
let currentGallery = null;
let galleryCache = {};

function showGalleryMenu() {
  const menuDiv = document.getElementById('galleryMenu');
  menuDiv.innerHTML = '';
  galleryList.forEach(gal => {
    const btn = document.createElement('button');
    btn.textContent = gal.name;
    btn.className = 'gallery-menu-btn' + (gal.id === currentGallery ? ' active' : '');
    btn.onclick = () => {
      if (gal.id !== currentGallery) {
        animateBtn(btn);
        switchGallery(gal.id);
      }
    };
    btn.onkeydown = e => { if (e.key === 'Enter' || e.key === ' ') btn.click(); }
    menuDiv.appendChild(btn);
  });
}

function animateBtn(btn) {
  btn.classList.add('clicked');
  setTimeout(() => btn.classList.remove('clicked'), 180);
}

function updateMenuActive() {
  document.querySelectorAll('.gallery-menu-btn').forEach(btn => {
    if (btn.textContent === getGalleryName(currentGallery)) {
      btn.classList.add('active');
      btn.setAttribute('tabindex', 0);
      btn.focus();
    } else {
      btn.classList.remove('active');
      btn.setAttribute('tabindex', -1);
    }
  });
}

function getGalleryName(galleryId) {
  const g = galleryList.find(g => g.id === galleryId);
  return g ? g.name : '';
}

function switchGallery(folderId) {
  currentGallery = folderId;
  updateMenuActive();
  fadeOutIn('#gallery', () => {
    // If cached, show directly, else load
    if (galleryCache[folderId]) {
      renderGallery(galleryCache[folderId]);
    } else {
      loadImages(folderId);
    }
  });
}

// Animation for gallery swap
function fadeOutIn(selector, cb) {
  const el = document.querySelector(selector);
  el.style.opacity = 0;
  setTimeout(() => {
    cb();
    setTimeout(() => { el.style.opacity = 1; }, 40);
  }, 120);
}

// Load images and cache
function loadImages(folderId) {
  images = [];
  document.getElementById('exportPDF').style.display = "none";
  document.getElementById('gallery').innerHTML = `
    <div style='
      text-align:center;
      color:#888;
      margin:30px auto;
      padding:22px 0 18px 0;
      font-size:1.17rem;
      font-weight:400;
      border-radius:18px;
      background:#fff;
      box-shadow:0 2px 24px rgba(0,0,0,.06);
      width:240px;
      border:1.7px solid #111;
      display: flex; align-items: center; justify-content: center;
      '>
      Đang tải ảnh...
    </div>
  `;
  google.script.run.withSuccessHandler(function(imgArr) {
    galleryCache[folderId] = imgArr;
    renderGallery(imgArr);
  }).getImages(folderId);
}

function initGallery() {
  google.script.run.withSuccessHandler(function(list){
    galleryList = list;
    if (!galleryList.length) {
      document.getElementById('galleryMenu').innerHTML = "<i style='color:#888;'>Không có gallery nào.</i>";
      return;
    }
    currentGallery = galleryList[0].id;
    showGalleryMenu();
    // Always check cache first
    if (galleryCache[currentGallery]) {
      renderGallery(galleryCache[currentGallery]);
    } else {
      loadImages(currentGallery);
    }
    updateMenuActive();
  }).getGalleryList();
}

function renderGallery(imgArr) {
  images = imgArr;
  const gal = document.getElementById('gallery');
  gal.innerHTML = '';
  if (!imgArr.length) {
    gal.innerHTML = "<i style='color:#888;'>Không có ảnh trong thư mục này.</i>";
    document.getElementById('exportPDF').style.display = "none";
    return;
  }
  imgArr.forEach((url, idx) => {
    const div = document.createElement('div');
    div.className = 'img-card';
    div.innerHTML = `<img src="${url}" alt="image" loading="lazy"/>`;
    div.onclick = () => openModal(idx); // Fix: open modal with correct idx
    gal.appendChild(div);
  });
  document.getElementById('exportPDF').style.display = "inline-block";
}

// Modal xem ảnh lớn
function openModal(idx) {
  currentIdx = idx;
  const modal = document.getElementById('modal');
  const modalImg = document.getElementById('modalImg');
  modalImg.src = images[idx];
  modal.classList.add('open');
  updateArrowBtns();
}
function hideModal(e) {
  if (e.target.id === "modal" || e.target.classList.contains('modal-img')) {
    document.getElementById('modal').classList.remove('open');
  }
}
function nextImg(e) {
  if (e) e.stopPropagation();
  if (currentIdx < images.length - 1) openModal(currentIdx + 1);
}
function prevImg(e) {
  if (e) e.stopPropagation();
  if (currentIdx > 0) openModal(currentIdx - 1);
}
function updateArrowBtns() {
  document.getElementById('prevBtn').style.display = currentIdx === 0 ? 'none' : 'flex';
  document.getElementById('nextBtn').style.display = currentIdx === images.length - 1 ? 'none' : 'flex';
}
document.addEventListener('keydown', function(e) {
  const modal = document.getElementById('modal');
  if (!modal.classList.contains('open')) return;
  if (e.key === 'ArrowRight') nextImg(e);
  if (e.key === 'ArrowLeft') prevImg(e);
  if (e.key === 'Escape') modal.classList.remove('open');
});

window.addEventListener('DOMContentLoaded', function() {
  initGallery();
});

const exportBtn = document.getElementById('exportPDF');
exportBtn.onclick = async function() {
  if (!images.length) return alert("Không có ảnh để xuất PDF!");
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();
  const margin = 12;
  pdf.setFontSize(22);
  pdf.text("HMSG PKD", pageWidth/2, 23, {align:"center"});
  pdf.setFontSize(11);
  let yStart = 36;
  for (let i = 0; i < images.length; i += 2) {
    if (i !== 0) pdf.addPage();
    let y = yStart;
    for (let j = 0; j < 2 && (i + j) < images.length; j++) {
      const img = new Image();
      img.src = images[i + j];
      await new Promise(resolve => { img.onload = resolve; });
      const availHeight = (pageHeight - yStart - margin) / 2 - margin/2;
      const availWidth = pageWidth - 2 * margin;
      let ratio = Math.min(availWidth / img.width, availHeight / img.height, 1);
      let w = img.width * ratio;
      let h = img.height * ratio;
      let x = (pageWidth - w) / 2;
      const canvas = document.createElement("canvas");
      canvas.width = img.width;
      canvas.height = img.height;
      canvas.getContext('2d').drawImage(img, 0, 0);
      const dataUrl = canvas.toDataURL("image/png");
      pdf.addImage(dataUrl, "PNG", x, y, w, h);
      y += h + margin;
    }
  }
  pdf.save('gallery.pdf');
};
</script>
