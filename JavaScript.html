<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
let images = [];
let currentIdx = 0;
let galleryList = [];
let currentGallery = null;

// Bộ nhớ tạm ảnh cho từng gallery, chỉ trên session này
let galleryCache = {}; // { [galleryId]: [array of images] }

function showGalleryMenu() {
  const menuDiv = document.getElementById('galleryMenu');
  menuDiv.innerHTML = '';
  galleryList.forEach(gal => {
    const btn = document.createElement('button');
    btn.textContent = gal.name;
    btn.className = 'gallery-menu-btn' + (gal.id === currentGallery ? ' active' : '');
    btn.onclick = () => {
      if (gal.id !== currentGallery) {
        currentGallery = gal.id;
        loadImages(currentGallery);
        updateMenuActive();
      }
    };
    menuDiv.appendChild(btn);
  });
}

function updateMenuActive() {
  document.querySelectorAll('.gallery-menu-btn').forEach(btn => {
    if (btn.textContent === getGalleryName(currentGallery)) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });
}

function getGalleryName(galleryId) {
  const g = galleryList.find(g => g.id === galleryId);
  return g ? g.name : '';
}

function loadImages(folderId) {
  images = [];
  // Nếu đã cache thì lấy luôn, không gọi Apps Script nữa
  if (galleryCache[folderId]) {
    renderGallery(galleryCache[folderId]);
    return;
  }
  document.getElementById('gallery').innerHTML = '<div>Đang tải ảnh...</div>';
  google.script.run.withSuccessHandler(function(imgArr) {
    // Lưu cache
    galleryCache[folderId] = imgArr;
    renderGallery(imgArr);
  }).getImages(folderId);
}

// Lấy danh sách gallery và khởi động
google.script.run.withSuccessHandler(function(list){
  galleryList = list;
  // Mặc định chọn gallery đầu tiên
  currentGallery = galleryList[0].id;
  showGalleryMenu();
  loadImages(currentGallery);
}).getGalleryList();

function renderGallery(imgArr) {
  images = imgArr;
  const gal = document.getElementById('gallery');
  gal.innerHTML = '';
  if (!imgArr.length) {
    gal.innerHTML = "<i>Không có ảnh trong thư mục này.</i>";
    return;
  }
  imgArr.forEach((url, idx) => {
    const div = document.createElement('div');
    div.className = 'img-card';
    div.innerHTML = `<img src="${url}" alt="image" loading="lazy"/>`;
    div.onclick = () => openModal(idx);
    gal.appendChild(div);
  });
}

// Modal logic (không đổi)
function openModal(idx) {
  currentIdx = idx;
  const modal = document.getElementById('modal');
  const modalImg = document.getElementById('modalImg');
  modalImg.src = images[idx];
  modal.classList.add('open');
  updateArrowBtns();
}
function hideModal(e) {
  if (e.target.id === "modal" || e.target.classList.contains('modal-img')) {
    document.getElementById('modal').classList.remove('open');
  }
}
function nextImg(e) {
  e.stopPropagation();
  if (currentIdx < images.length - 1) openModal(currentIdx + 1);
}
function prevImg(e) {
  e.stopPropagation();
  if (currentIdx > 0) openModal(currentIdx - 1);
}
function updateArrowBtns() {
  document.getElementById('prevBtn').style.display = currentIdx === 0 ? 'none' : 'flex';
  document.getElementById('nextBtn').style.display = currentIdx === images.length - 1 ? 'none' : 'flex';
}
document.addEventListener('keydown', function(e) {
  const modal = document.getElementById('modal');
  if (!modal.classList.contains('open')) return;
  if (e.key === 'ArrowRight') nextImg(e);
  if (e.key === 'ArrowLeft') prevImg(e);
  if (e.key === 'Escape') modal.classList.remove('open');
});

// Xuất PDF: mỗi trang 2 ảnh, căn giữa, có viền, trang đầu có tiêu đề không dấu
document.getElementById('exportPDF').onclick = async function() {
  if (!images.length) return alert("Không có ảnh để xuất PDF!");
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();
  const margin = 12; // lề mỗi phía

  // Trang đầu: tiêu đề (không dấu)
  pdf.setFontSize(24);
  pdf.text("HMSG PKD", pageWidth/2, 24, {align:"center"});
  pdf.setFontSize(12);

  let yStart = 40;
  for (let i = 0; i < images.length; i += 2) {
    if (i !== 0) pdf.addPage();
    let y = yStart;
    for (let j = 0; j < 2 && (i + j) < images.length; j++) {
      const img = new Image();
      img.src = images[i + j];
      await new Promise(resolve => { img.onload = resolve; });
      // Tính toán kích thước phù hợp (nửa trang, trừ lề)
      const availHeight = (pageHeight - yStart - margin) / 2 - margin/2;
      const availWidth = pageWidth - 2 * margin;
      let ratio = Math.min(availWidth / img.width, availHeight / img.height, 1);
      let w = img.width * ratio;
      let h = img.height * ratio;
      let x = (pageWidth - w) / 2;
      // Chuyển về base64 để add vào jsPDF
      const canvas = document.createElement("canvas");
      canvas.width = img.width;
      canvas.height = img.height;
      canvas.getContext('2d').drawImage(img, 0, 0);
      const dataUrl = canvas.toDataURL("image/png");
      pdf.addImage(dataUrl, "PNG", x, y, w, h);
      y += h + margin;
    }
  }
  pdf.save('gallery.pdf');
};
</script>
<style>
/* Thêm CSS cho menu gallery */
.gallery-menu {
  display: flex;
  justify-content: center;
  margin-bottom: 24px;
  gap: 12px;
}
.gallery-menu-btn {
  padding: 8px 22px;
  border: none;
  border-radius: 6px;
  background: #e3e6ee;
  color: #222;
  font-weight: bold;
  font-size: 1.07rem;
  cursor: pointer;
  transition: background 0.15s;
  letter-spacing: 1px;
}
.gallery-menu-btn.active, .gallery-menu-btn:hover {
  background: #1976d2;
  color: #fff;
}
</style>
