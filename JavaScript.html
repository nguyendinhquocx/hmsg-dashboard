<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// Global variables
let images = [];
let currentIdx = 0;
let galleryList = [];
let currentGallery = null;
let galleryCache = {};

// Gallery navigation management
function renderGalleryNav() {
  const nav = document.getElementById('galleryNav');
  nav.innerHTML = '';
  
  galleryList.forEach(gal => {
    const btn = document.createElement('button');
    btn.textContent = gal.name;
    btn.className = 'gallery-nav-btn' + (gal.id === currentGallery ? ' active' : '');
    btn.onclick = () => {
      if (gal.id !== currentGallery) {
        switchGallery(gal.id);
      }
    };
    nav.appendChild(btn);
  });
}

function updateMenuActive() {
  document.querySelectorAll('.gallery-nav-btn').forEach(btn => {
    if (btn.textContent === getGalleryName(currentGallery)) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });
}

function getGalleryName(galleryId) {
  const gallery = galleryList.find(g => g.id === galleryId);
  return gallery ? gallery.name : '';
}

function switchGallery(folderId) {
  currentGallery = folderId;
  updateMenuActive();
  
  fadeOutIn('#gallery', () => {
    if (galleryCache[folderId]) {
      renderGallery(galleryCache[folderId]);
    } else {
      loadImages(folderId);
    }
  });
}

function fadeOutIn(selector, callback) {
  const element = document.querySelector(selector);
  element.style.opacity = '0';
  
  setTimeout(() => {
    callback();
    setTimeout(() => {
      element.style.opacity = '1';
    }, 50);
  }, 150);
}

// Image loading and gallery rendering
function loadImages(folderId) {
  images = [];
  document.getElementById('exportPDF').style.display = 'none';
  
  const gallery = document.getElementById('gallery');
  gallery.innerHTML = `
    <div style="
      text-align: center;
      color: var(--gray-medium);
      padding: 40px 20px;
      font-size: 14px;
      border-radius: 8px;
      background: #f9f9f9;
      border: 1px solid var(--border);
      margin: 20px auto;
      max-width: 300px;
    ">
      <div style="margin-bottom: 8px;">⏳</div>
      Đang tải ảnh...
    </div>
  `;
  
  google.script.run
    .withSuccessHandler(function(imgArray) {
      galleryCache[folderId] = imgArray;
      renderGallery(imgArray);
    })
    .withFailureHandler(function(error) {
      console.error('Error loading images:', error);
      gallery.innerHTML = `
        <div style="
          text-align: center;
          color: #dc3545;
          padding: 40px 20px;
          font-size: 14px;
          border-radius: 8px;
          background: #fff5f5;
          border: 1px solid #ffcdd2;
          margin: 20px auto;
          max-width: 300px;
        ">
          <div style="margin-bottom: 8px;">❌</div>
          Không thể tải ảnh. Vui lòng thử lại.
        </div>
      `;
    })
    .getImages(folderId);
}

function renderGallery(imgArray) {
  images = imgArray;
  const gallery = document.getElementById('gallery');
  gallery.innerHTML = '';
  
  if (!imgArray || imgArray.length === 0) {
    gallery.innerHTML = `
      <div style="
        text-align: center;
        color: var(--gray-medium);
        padding: 60px 20px;
        font-size: 16px;
        border-radius: 12px;
        background: #f9f9f9;
        border: 1px solid var(--border);
        margin: 40px auto;
        max-width: 400px;
      ">
        <div style="margin-bottom: 12px; font-size: 24px;">📁</div>
        Không có ảnh trong thư mục này
      </div>
    `;
    document.getElementById('exportPDF').style.display = 'none';
    return;
  }
  
  imgArray.forEach((imageUrl, index) => {
    const imgCard = document.createElement('div');
    imgCard.className = 'img-card';
    imgCard.innerHTML = `<img src="${imageUrl}" alt="Biểu đồ ${index + 1}" loading="lazy"/>`;
    
    imgCard.addEventListener('click', function() {
      openImageModal(index);
    });
    
    gallery.appendChild(imgCard);
  });
  
  // Show export button
  document.getElementById('exportPDF').style.display = 'flex';
}

// Image modal management
function openImageModal(index) {
  currentIdx = index;
  const modal = document.getElementById('modal');
  const modalImg = document.getElementById('modalImg');
  
  if (modal && modalImg && images[index]) {
    modalImg.src = images[index];
    modal.classList.add('open');
    updateArrowBtns();
    document.body.style.overflow = 'hidden';
  }
}

function hideModal(event) {
  if (event.target.id === 'modal' || event.target.classList.contains('modal-img')) {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = 'auto';
  }
}

function nextImg(event) {
  if (event) event.stopPropagation();
  if (currentIdx < images.length - 1) {
    openImageModal(currentIdx + 1);
  }
}

function prevImg(event) {
  if (event) event.stopPropagation();
  if (currentIdx > 0) {
    openImageModal(currentIdx - 1);
  }
}

function updateArrowBtns() {
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  
  if (prevBtn) {
    prevBtn.style.display = currentIdx === 0 ? 'none' : 'flex';
  }
  if (nextBtn) {
    nextBtn.style.display = currentIdx === images.length - 1 ? 'none' : 'flex';
  }
}

// Initialize gallery
function initGallery() {
  google.script.run
    .withSuccessHandler(function(galleries) {
      galleryList = galleries;
      
      if (!galleryList || galleryList.length === 0) {
        document.getElementById('galleryNav').innerHTML = `
          <div style="color: var(--gray-medium); padding: 10px;">
            Không có gallery nào
          </div>
        `;
        return;
      }
      
      currentGallery = galleryList[0].id;
      renderGalleryNav();
      
      if (galleryCache[currentGallery]) {
        renderGallery(galleryCache[currentGallery]);
      } else {
        loadImages(currentGallery);
      }
      
      updateMenuActive();
    })
    .withFailureHandler(function(error) {
      console.error('Error loading gallery list:', error);
      document.getElementById('galleryNav').innerHTML = `
        <div style="color: #dc3545; padding: 10px;">
          Lỗi tải danh sách gallery
        </div>
      `;
    })
    .getGalleryList();
}

// PDF Export functionality
function setupPDFExport() {
  const exportBtn = document.getElementById('exportPDF');
  
  if (exportBtn) {
    exportBtn.onclick = async function() {
      if (!images || images.length === 0) {
        alert('Không có ảnh để xuất PDF!');
        return;
      }
      
      try {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({
          orientation: 'portrait',
          unit: 'mm',
          format: 'a4'
        });
        
        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();
        const margin = 15;
        
        // Add title
        pdf.setFontSize(20);
        pdf.text('HMSG P.KD - ' + getGalleryName(currentGallery), pageWidth/2, 25, {align: 'center'});
        
        let yPosition = 40;
        
        for (let i = 0; i < images.length; i++) {
          if (i > 0) {
            pdf.addPage();
            yPosition = 25;
          }
          
          const img = new Image();
          img.crossOrigin = 'anonymous';
          
          await new Promise((resolve, reject) => {
            img.onload = resolve;
            img.onerror = reject;
            img.src = images[i];
          });
          
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);
          
          const imgData = canvas.toDataURL('image/jpeg', 0.8);
          
          const maxWidth = pageWidth - (margin * 2);
          const maxHeight = pageHeight - yPosition - margin;
          
          const aspectRatio = img.width / img.height;
          let imgWidth = maxWidth;
          let imgHeight = imgWidth / aspectRatio;
          
          if (imgHeight > maxHeight) {
            imgHeight = maxHeight;
            imgWidth = imgHeight * aspectRatio;
          }
          
          const xPosition = (pageWidth - imgWidth) / 2;
          
          pdf.addImage(imgData, 'JPEG', xPosition, yPosition, imgWidth, imgHeight);
        }
        
        const fileName = `HMSG_PKD_${getGalleryName(currentGallery)}_${new Date().getTime()}.pdf`;
        pdf.save(fileName);
        
      } catch (error) {
        console.error('Error generating PDF:', error);
        alert('Có lỗi xảy ra khi tạo PDF. Vui lòng thử lại.');
      }
    };
  }
}

// Keyboard events
document.addEventListener('keydown', function(event) {
  const modal = document.getElementById('modal');
  
  if (modal && modal.classList.contains('open')) {
    switch(event.key) {
      case 'ArrowRight':
        nextImg(event);
        break;
      case 'ArrowLeft':
        prevImg(event);
        break;
      case 'Escape':
        modal.classList.remove('open');
        document.body.style.overflow = 'auto';
        break;
    }
  }
});

// Initialize everything when DOM is loaded
window.addEventListener('DOMContentLoaded', function() {
  initGallery();
  setupPDFExport();
});
</script>
