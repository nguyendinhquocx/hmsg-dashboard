<style>
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f6f8fa;
  margin: 0;
  min-height: 100vh;
}
.container {
  max-width: 1100px;
  margin: 40px auto;
  background: #fff;
  border-radius: 18px;
  box-shadow: 0 8px 32px rgba(60,60,60,.15);
  padding: 32px 18px 48px 18px;
}
h1 {
  text-align: center;
  font-size: 2.4rem;
  margin-bottom: 24px;
  color: #222;
  letter-spacing: 1px;
}
.export-btn {
  display: block;
  margin: 36px auto 0 auto;
  padding: 12px 36px;
  border-radius: 8px;
  font-size: 1.1rem;
  background: #222;
  color: #fff;
  border: none;
  cursor: pointer;
  transition: background 0.15s;
  font-weight: bold;
  letter-spacing: 1px;
}
.export-btn:hover { background: #444; }


.gallery {
  display: flex;
  flex-direction: column;
  gap: 36px;
  align-items: center;
}
.img-card {
  width: 100%;
  max-width: 950px;
  background: #fafbfd;
  border-radius: 16px;
  box-shadow: 0 2px 12px rgba(60,60,60,.08);
  padding: 18px 0;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: box-shadow 0.2s;
  cursor: pointer;
  margin: 0 auto;
}
.img-card img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 12px;
  box-shadow: 0 1px 6px rgba(0,0,0,.08);
  transition: transform 0.2s;
  background: #fff;
  max-width: 100%;
  max-height: 70vh;
}
.img-card:hover {
  box-shadow: 0 4px 24px rgba(0,0,0,.15);
}

/* Modal popup */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0; top: 0; width: 100vw; height: 100vh;
  background: rgba(30, 34, 44, 0.86);
  justify-content: center;
  align-items: center;
  cursor: zoom-out;
}
.modal.open { display: flex; }
.modal-img {
  max-width: 90vw;
  max-height: 90vh;
  border-radius: 24px;
  box-shadow: 0 8px 32px rgba(0,0,0,.41);
  background: #fff;
  animation: zoomIn .22s;
  object-fit: contain;
  margin: 0 38px;
}
@keyframes zoomIn {
  from { transform: scale(0.85);}
  to { transform: scale(1);}
}
/* Mũi tên chuyển ảnh */
.arrow-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 2.7rem;
  background: rgba(255,255,255,0.6);
  color: #333;
  border: none;
  border-radius: 50%;
  width: 54px;
  height: 54px;
  cursor: pointer;
  z-index: 1000;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0.92;
  transition: background 0.15s;
  user-select: none;
}
.arrow-btn.left { left: 24px; }
.arrow-btn.right { right: 24px; }
.arrow-btn:hover { background: #1976d2; color:#fff; }

@media (max-width: 800px) {
  .container { padding: 8px;}
  .img-card { max-width: 99vw;}
  .modal-img { max-width: 99vw; max-height: 82vh;}
  .arrow-btn { width:40px; height:40px; font-size:2rem;}
}
</style>
